openapi: 3.0.3
info:
  title: TCSS 460 Team 6 API
  version: 0.2.0
  description: |
    **Team:** Group 6
    **Deployed URL:** https://tcss460-team-6-api.onrender.com

    A RESTful API for the TCSS 460 group project. Proxies movie and TV show data
    through team-designed endpoints with custom response schemas — clients never
    interact with any third-party service directly.

    Sprint 2 adds user-generated content: ratings and reviews are persisted in
    PostgreSQL via Prisma. Sprint 3 replaces dev-login with real authentication
    via Auth² — the course's shared OAuth2 + OIDC identity provider.

    **Authentication:** Write endpoints require a Bearer JWT issued by Auth²
    (`https://tcss-460-iam.onrender.com`), scoped to the `group-6-api` audience.
    Obtain a token from the TCSS 460 Token Playground by selecting the
    `group-6-api` audience. Tokens expire after one hour.

    **Role gating:** Protected routes use a 5-tier hierarchy —
    `User < Moderator < Admin < SuperAdmin < Owner`. Routes requiring elevated
    access use `requireRoleAtLeast('Admin')` or above.
servers:
  - url: https://tcss460-team-6-api.onrender.com
    description: Deployed production server
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: General
    description: General-purpose routes
  - name: Movies
    description: Search, browse, and retrieve movie data
  - name: TV Shows
    description: Search, browse, and retrieve TV show data
  - name: Ratings
    description: User ratings for movies and TV shows
  - name: Reviews
    description: User reviews for movies and TV shows
  - name: Issues
    description: Public bug report and feedback submissions
  - name: Users
    description: Authenticated user profile and activity routes
  - name: Community
    description: Public discovery feeds — top-rated and most-reviewed titles
security: []
paths:
  /health:
    get:
      tags:
        - General
      summary: Health check
      description: Returns 200 when the server is running. Used by deployment
        platforms and uptime monitors.
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: OK
                timestamp: 2026-04-16T10:30:00Z
  /v1/media/movies:
    get:
      tags:
        - Movies
      summary: Search movies
      description: >
        Search for movies by title. Optionally filter by release year or genre.
        Returns a paginated list of movie cards — enough data to render a
        poster, title, and release year. For full details, use GET
        /media/movies/{id}.
      operationId: searchMovies
      parameters:
        - $ref: "#/components/parameters/movieTitleParam"
        - $ref: "#/components/parameters/yearParam"
        - $ref: "#/components/parameters/genreIdParam"
        - $ref: "#/components/parameters/pageParam"
      responses:
        "200":
          description: A paginated list of matching movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
              example:
                page: 1
                totalPages: 4
                totalResults: 72
                results:
                  - id: 550
                    title: Fight Club
                    releaseYear: 1999
                    posterUrl: https://image.tmdb.org/t/p/w500/pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg
                    overview: An insomniac office worker and a devil-may-care soap maker form an
                      underground fight club.
                    genres:
                      - id: 18
                        name: Drama
                      - id: 53
                        name: Thriller
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/media/movies/by-cast:
    get:
      tags:
        - Movies
      summary: Search movies by cast member
      description: >
        Search for movies that feature a given cast member. Resolves the name to
        the top-matching person via TMDB person search, then returns that
        person's movie credits as actor. Results are sorted by TMDB popularity
        and paginated locally (20 per page). Returns an empty result list when
        no matching person is found.
      operationId: searchMoviesByCast
      parameters:
        - $ref: "#/components/parameters/castNameParam"
        - $ref: "#/components/parameters/pageParam"
      responses:
        "200":
          description: A paginated list of movies featuring the cast member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
              example:
                page: 1
                totalPages: 3
                totalResults: 47
                results:
                  - id: 550
                    title: Fight Club
                    releaseYear: 1999
                    posterUrl: https://image.tmdb.org/t/p/w500/pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg
                    rating: 8.4
                    overview: An insomniac office worker and a devil-may-care soap maker form an
                      underground fight club.
                    genres:
                      - id: 18
                        name: Drama
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/media/movies/popular:
    get:
      tags:
        - Movies
      summary: Popular movies
      description: >
        Returns a paginated list of currently popular movies. Popularity is
        determined by upstream trending and view data. Results are ordered by
        popularity score descending.
      operationId: getPopularMovies
      parameters:
        - $ref: "#/components/parameters/pageParam"
      responses:
        "200":
          description: A paginated list of popular movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
              example:
                page: 1
                totalPages: 20
                totalResults: 400
                results:
                  - id: 1022789
                    title: Inside Out 2
                    releaseYear: 2024
                    posterUrl: https://image.tmdb.org/t/p/w500/vpnVM9B6NMmQpWeZvzLvDESb2QY.jpg
                    overview: Riley's mind headquarters is suddenly turned upside down as Joy and
                      the other Emotions try to make room for a new arrival.
                    genres:
                      - id: 16
                        name: Animation
                      - id: 10751
                        name: Family
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/media/movies/{id}:
    get:
      tags:
        - Movies
      summary: Movie details
      description: >
        Returns full details for a single movie by its ID. Includes all fields
        needed to render a rich detail page: poster, backdrop, synopsis,
        runtime, genres, cast, and similar titles.
      operationId: getMovieById
      parameters:
        - $ref: "#/components/parameters/mediaIdParam"
      responses:
        "200":
          description: Full details for the requested movie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieDetail"
              example:
                id: 550
                title: Fight Club
                tagline: Mischief. Mayhem. Soap.
                overview: An insomniac office worker and a devil-may-care soap maker form an
                  underground fight club that evolves into something much, much
                  more.
                releaseYear: 1999
                releaseDate: 1999-10-15
                runtimeMinutes: 139
                posterUrl: https://image.tmdb.org/t/p/w500/pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg
                backdropUrl: https://image.tmdb.org/t/p/original/fCayJrkfRaCRCTh8GqN30f8oyQF.jpg
                status: Released
                genres:
                  - id: 18
                    name: Drama
                  - id: 53
                    name: Thriller
                cast:
                  - name: Brad Pitt
                    character: Tyler Durden
                    profileUrl: https://image.tmdb.org/t/p/w185/cckcYc2v0yh1tc9QjRelptcOBko.jpg
                  - name: Edward Norton
                    character: The Narrator
                    profileUrl: https://image.tmdb.org/t/p/w185/5XBzD5WuTyVQZeS4VI25z2moMeY.jpg
                similar:
                  - id: 1422
                    title: The Departed
                    releaseYear: 2006
                    posterUrl: https://image.tmdb.org/t/p/w500/nT97ifVT2J1yMQmeq20Qblg61T.jpg
                    overview: To take down South Boston's Irish Mob, the police send in one of their
                      own to infiltrate it.
                    genres:
                      - id: 80
                        name: Crime
                      - id: 18
                        name: Drama
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/media/movies/{id}/enriched:
    get:
      tags:
        - Movies
      summary: Enriched movie detail
      description: >
        Returns TMDB movie metadata combined with community aggregate data in a
        single response. The `tmdb` block contains the same fields as GET
        /media/movies/{id}. The `community` block contains the average rating,
        total review count, and up to 3 recent reviews inline — enough for the
        frontend to decide whether to show a "Load more" button without a second
        request.


        **Optional authentication:** Send a Bearer token to receive a `myRating`
        field in the `community` block (your own score, or `null` if you have
        not rated this title yet). The route is fully public without a token.
      operationId: getEnrichedMovieDetail
      security: []
      parameters:
        - $ref: "#/components/parameters/mediaIdParam"
      responses:
        "200":
          description: Enriched movie detail with community stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrichedMovieDetail"
              example:
                tmdb:
                  id: 27205
                  title: Inception
                  tagline: Your mind is the scene of the crime.
                  overview: A thief who steals corporate secrets through the use of dream-sharing
                    technology is given the inverse task of planting an idea
                    into the mind of a C.E.O.
                  releaseYear: 2010
                  releaseDate: 2010-07-15
                  runtimeMinutes: 148
                  posterUrl: https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg
                  backdropUrl: https://image.tmdb.org/t/p/original/s3TBrRGB1iav7gFOCNx3H31MoES.jpg
                  status: Released
                  genres:
                    - id: 28
                      name: Action
                    - id: 878
                      name: Science Fiction
                  cast:
                    - name: Leonardo DiCaprio
                      character: Dom Cobb
                      profileUrl: https://image.tmdb.org/t/p/w185/wo2hJpn04vbtmh0B9utCFdsQhxM.jpg
                  similar: []
                community:
                  averageRating: 4.3
                  reviewCount: 12
                  recentReviews:
                    - id: 1
                      title: Mind-bending
                      body: Best movie I have ever seen.
                      author:
                        id: auth2|abc123
                        username: johndoe
                      createdAt: 2026-04-20T12:00:00Z
                  myRating: 8
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Failed to reach TMDB upstream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Failed to reach TMDB
  /v1/media/tv:
    get:
      tags:
        - TV Shows
      summary: Search TV shows
      description: >
        Search for TV shows by title. Optionally filter by first air year or
        genre. Returns a paginated list of show cards — enough data to render a
        poster, title, and first air date. For full details, use GET
        /media/tv/{id}.
      operationId: searchTVShows
      parameters:
        - $ref: "#/components/parameters/tvTitleParam"
        - $ref: "#/components/parameters/yearParam"
        - $ref: "#/components/parameters/genreIdParam"
        - $ref: "#/components/parameters/pageParam"
      responses:
        "200":
          description: A paginated list of matching TV shows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TVShowListResponse"
              example:
                page: 1
                totalPages: 2
                totalResults: 28
                results:
                  - id: 1396
                    title: Breaking Bad
                    firstAirDate: 2008-01-20
                    posterUrl: https://image.tmdb.org/t/p/w500/ggFHVNu6YYI5L9pCfOacjizRGt.jpg
                    overview: A chemistry teacher diagnosed with inoperable lung cancer turns to
                      manufacturing and selling methamphetamine.
                    genres:
                      - id: 18
                        name: Drama
                      - id: 80
                        name: Crime
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/media/tv/by-cast:
    get:
      tags:
        - TV Shows
      summary: Search TV shows by cast member
      description: >
        Search for TV shows that feature a given cast member. Resolves the name
        to the top-matching person via TMDB person search, then returns that
        person's TV credits as actor. Results are sorted by TMDB popularity and
        paginated locally (20 per page). Returns an empty result list when no
        matching person is found.
      operationId: searchTVShowsByCast
      parameters:
        - $ref: "#/components/parameters/castNameParam"
        - $ref: "#/components/parameters/pageParam"
      responses:
        "200":
          description: A paginated list of TV shows featuring the cast member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TVShowListResponse"
              example:
                page: 1
                totalPages: 2
                totalResults: 25
                results:
                  - id: 1396
                    title: Breaking Bad
                    firstAirDate: 2008-01-20
                    posterUrl: https://image.tmdb.org/t/p/w500/ggFHVNu6YYI5L9pCfOacjizRGt.jpg
                    rating: 9.5
                    overview: A chemistry teacher diagnosed with inoperable lung cancer turns to
                      manufacturing methamphetamine.
                    genres:
                      - id: 18
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/media/tv/popular:
    get:
      tags:
        - TV Shows
      summary: Popular TV shows
      description: >
        Returns a paginated list of currently popular TV shows. Popularity is
        determined by upstream trending and view data. Results are ordered by
        popularity score descending.
      operationId: getPopularTVShows
      parameters:
        - $ref: "#/components/parameters/pageParam"
      responses:
        "200":
          description: A paginated list of popular TV shows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TVShowListResponse"
              example:
                page: 1
                totalPages: 20
                totalResults: 400
                results:
                  - id: 94997
                    title: House of the Dragon
                    firstAirDate: 2022-08-21
                    posterUrl: https://image.tmdb.org/t/p/w500/z2yahl2uefxDCl0nogcRBstwruJ.jpg
                    overview: The story of the House Targaryen set 200 years before the events of
                      Game of Thrones.
                    genres:
                      - id: 10765
                        name: Sci-Fi & Fantasy
                      - id: 18
                        name: Drama
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/media/tv/{id}:
    get:
      tags:
        - TV Shows
      summary: TV show details
      description: >
        Returns full details for a single TV show by its ID. Includes all fields
        needed to render a rich detail page: poster, backdrop, synopsis,
        seasons, networks, genres, cast, and similar shows.
      operationId: getTVShowById
      parameters:
        - $ref: "#/components/parameters/mediaIdParam"
      responses:
        "200":
          description: Full details for the requested TV show
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TVShowDetail"
              example:
                id: 1396
                title: Breaking Bad
                overview: A chemistry teacher diagnosed with inoperable lung cancer turns to
                  manufacturing and selling methamphetamine in order to secure
                  his family's future.
                firstAirDate: 2008-01-20
                lastAirDate: 2013-09-29
                status: Ended
                totalSeasons: 5
                totalEpisodes: 62
                averageEpisodeMinutes: 45
                posterUrl: https://image.tmdb.org/t/p/w500/ggFHVNu6YYI5L9pCfOacjizRGt.jpg
                backdropUrl: https://image.tmdb.org/t/p/original/tsRy63Mu5cu8etL1X7ZLyf7UP1M.jpg
                genres:
                  - id: 18
                    name: Drama
                  - id: 80
                    name: Crime
                networks:
                  - name: AMC
                    logoUrl: https://image.tmdb.org/t/p/w92/alqLicR1ZMHMaZGP3xRQxn9sq7p.png
                seasons:
                  - seasonNumber: 1
                    episodeCount: 7
                    airDate: 2008-01-20
                    posterUrl: https://image.tmdb.org/t/p/w500/1BP4xYv9ZG4ZVHkL7ocOziBbSYH.jpg
                cast:
                  - name: Bryan Cranston
                    character: Walter White
                    profileUrl: https://image.tmdb.org/t/p/w185/7Jahy5LZX2Fo8fGJltMreAI49hC.jpg
                  - name: Aaron Paul
                    character: Jesse Pinkman
                    profileUrl: https://image.tmdb.org/t/p/w185/glEjyreZMVvkPmSe9G2n23BXZXR.jpg
                similar:
                  - id: 60574
                    title: Peaky Blinders
                    firstAirDate: 2013-09-12
                    posterUrl: https://image.tmdb.org/t/p/w500/vUUqzWa2LnHIVqkaKVn3nyfVSBx.jpg
                    overview: A gangster family epic set in 1919 Birmingham, England.
                    genres:
                      - id: 80
                        name: Crime
                      - id: 18
                        name: Drama
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/media/tv/{id}/enriched:
    get:
      tags:
        - TV Shows
      summary: Enriched TV show detail
      description: >
        Returns TMDB TV show metadata combined with community aggregate data in
        a single response. The `tmdb` block contains the same fields as GET
        /media/tv/{id}. The `community` block contains the average rating, total
        review count, and up to 3 recent reviews inline — enough for the
        frontend to decide whether to show a "Load more" button without a second
        request.


        **Optional authentication:** Send a Bearer token to receive a `myRating`
        field in the `community` block (your own score, or `null` if you have
        not rated this title yet). The route is fully public without a token.
      operationId: getEnrichedTVShowDetail
      security: []
      parameters:
        - $ref: "#/components/parameters/mediaIdParam"
      responses:
        "200":
          description: Enriched TV show detail with community stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrichedTVShowDetail"
              example:
                tmdb:
                  id: 1396
                  title: Breaking Bad
                  overview: A chemistry teacher diagnosed with inoperable lung cancer turns to
                    manufacturing and selling methamphetamine.
                  firstAirDate: 2008-01-20
                  lastAirDate: 2013-09-29
                  status: Ended
                  totalSeasons: 5
                  totalEpisodes: 62
                  averageEpisodeMinutes: 45
                  posterUrl: https://image.tmdb.org/t/p/w500/ggFHVNu6YYI5L9pCfOacjizRGt.jpg
                  backdropUrl: https://image.tmdb.org/t/p/original/tsRy63Mu5cu8etL1X7ZLyf7UP1M.jpg
                  genres:
                    - id: 18
                      name: Drama
                    - id: 80
                      name: Crime
                  networks:
                    - name: AMC
                      logoUrl: https://image.tmdb.org/t/p/w92/alqLicR1ZMHMaZGP3xRQxn9sq7p.png
                  seasons:
                    - seasonNumber: 1
                      episodeCount: 7
                      airDate: 2008-01-20
                      posterUrl: https://image.tmdb.org/t/p/w500/1BP4xYv9ZG4ZVHkL7ocOziBbSYH.jpg
                  cast:
                    - name: Bryan Cranston
                      character: Walter White
                      profileUrl: https://image.tmdb.org/t/p/w185/7Jahy5LZX2Fo8fGJltMreAI49hC.jpg
                  similar: []
                community:
                  averageRating: null
                  reviewCount: 0
                  recentReviews: []
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Failed to reach TMDB upstream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Failed to reach TMDB
  /v1/reviews/me:
    get:
      tags:
        - Reviews
      summary: My reviews
      description: >
        Returns paginated reviews written by the authenticated user, sorted most
        recent first. Identity is always read from the Bearer token — a `userId`
        query parameter is never accepted.
      operationId: getMyReviews
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
      responses:
        "200":
          description: Reviews written by the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyReviewListResponse"
              example:
                totalReviews: 1
                page: 1
                totalPages: 1
                results:
                  - id: 1
                    tmdbId: 550
                    mediaType: movie
                    title: A haunting masterpiece
                    body: Fight Club is a film that gets better with every rewatch.
                    userId: 3
                    author:
                      id: auth2|abc123
                      username: johndoe
                    createdAt: 2026-04-20T12:00:00Z
                    updatedAt: 2026-04-20T12:00:00Z
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ratings/me:
    get:
      tags:
        - Ratings
      summary: My ratings
      description: >
        Returns paginated ratings submitted by the authenticated user, sorted
        most recent first. Identity is always read from the Bearer token — a
        `userId` query parameter is never accepted.
      operationId: getMyRatings
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
      responses:
        "200":
          description: Ratings submitted by the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyRatingListResponse"
              example:
                totalRatings: 1
                page: 1
                totalPages: 1
                results:
                  - id: 1
                    tmdbId: 550
                    mediaType: movie
                    score: 9
                    userId: 3
                    author:
                      id: auth2|abc123
                      username: johndoe
                    createdAt: 2026-04-20T12:00:00Z
                    updatedAt: 2026-04-20T12:00:00Z
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ratings:
    post:
      tags:
        - Ratings
      summary: Submit or update a rating
      description: >
        Creates a rating for the authenticated user. If the user has already
        rated this content (same tmdbId + mediaType), the existing rating is
        updated (upsert). The userId is always taken from the JWT — never from
        the request body.
      operationId: createOrUpdateRating
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingRequest"
            example:
              tmdbId: 550
              mediaType: movie
              score: 9
      responses:
        "200":
          description: Rating upserted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"
              example:
                id: 1
                tmdbId: 550
                mediaType: movie
                score: 9
                userId: 3
                createdAt: 2026-04-20T12:00:00Z
                updatedAt: 2026-04-20T12:00:00Z
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ratings/{tmdbId}:
    get:
      tags:
        - Ratings
      summary: Get ratings for a title
      description: >
        Returns all ratings submitted for a given TMDB identifier and media
        type. No authentication required. Includes aggregate stats (average
        score, count) alongside the individual records.
      operationId: getRatingsByTmdbId
      parameters:
        - $ref: "#/components/parameters/tmdbIdParam"
        - $ref: "#/components/parameters/mediaTypeParam"
        - $ref: "#/components/parameters/pageParam"
      responses:
        "200":
          description: Ratings for the requested title
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatingListResponse"
              example:
                tmdbId: 550
                mediaType: movie
                averageScore: 8.7
                totalRatings: 3
                page: 1
                totalPages: 1
                results:
                  - id: 1
                    score: 9
                    userId: 3
                    createdAt: 2026-04-20T12:00:00Z
                    updatedAt: 2026-04-20T12:00:00Z
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ratings/{id}:
    put:
      tags:
        - Ratings
      summary: Update a rating
      description: >
        Updates the score on an existing rating. The authenticated user must own
        the rating. Admins may update any rating.
      operationId: updateRating
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/recordIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchRatingRequest"
            example:
              score: 7
      responses:
        "200":
          description: Rating updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
